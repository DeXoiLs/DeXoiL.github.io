<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun DeXoiL Store</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #03ac0e;
    padding: 15px;
    color: white;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 70px);
}

/* CARD */
.card {
    background: white;
    width: 100%;
    max-width: 400px;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    color: #777;
    margin-bottom: 20px;
}

/* FORM */
.form-group {
    margin-bottom: 15px;
}

.form-group label {
    font-size: 13px;
    display: block;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.form-group input:focus {
    border-color: #03ac0e;
    outline: none;
}

/* BUTTON */
.btn {
    width: 100%;
    background: #03ac0e;
    color: white;
    border: none;
    padding: 12px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover {
    background: #02940c;
}

/* GOOGLE BTN */
.btn-google {
    margin-top: 10px;
    background: white;
    color: #444;
    border: 1px solid #ccc;
}

.btn-google:hover {
    background: #f3f3f3;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 13px;
    margin-top: 15px;
}

.footer a {
    color: #03ac0e;
    text-decoration: none;
    font-weight: bold;
}

/* RESPONSIVE */
@media(max-width: 480px) {
    .card {
        margin: 10px;
    }
}
</style>
</head>

<body>

<header>
    DeXoiL Store
</header>

<div class="container">
    <div class="card">
        <h2>Daftar Akun</h2>
        <p>Daftar sekarang dan nikmati kemudahan berbelanja</p>

        <form>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama lengkap">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Masukkan email">
            </div>

            <div class="form-group">
                <label>No. HP</label>
                <input type="tel" placeholder="Contoh: 08123456789">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Buat password">
            </div>

            <button class="btn">Daftar</button>

            <button type="button" class="btn btn-google">
                Daftar dengan Google
            </button>
        </form>

        <div class="footer">
            Sudah punya akun?
            <a href="index.html">Masuk</a>
        </div>
    </div>
</div>

</body>
</html>
